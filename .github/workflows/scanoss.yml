name: Example SCANOSS Action

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read

jobs:
  scanoss-analysis:
    name: SCANOSS Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run SCANOSS analysis
        uses: scanoss/actions-scan@v0
        with:
          policies: copyleft, undeclared
          dependencies.enabled: true
          licenses.copyleft.include: MIT
          dependencies.scope.include: devDependencies

      - name: Trigger Weekly Scan Repository
        if: github.event_name == 'push'
        run: |
          echo "Triggering weeklyscan repository..."

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.WEEKLYSCAN_TOKEN }}" \
            https://api.github.com/repos/premchandoffice/weeklyscan/dispatches \
            -d '{
              "event_type":"run-sbom-scan",
              "client_payload":{
                "repository":"${{ github.repository }}",
                "clone_url":"https://github.com/${{ github.repository }}.git",
                "branch":"${{ github.ref_name }}",
                "sha":"${{ github.sha }}"
              }
            }')

          echo "$RESPONSE"
